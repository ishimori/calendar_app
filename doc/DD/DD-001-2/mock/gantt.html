<!doctype html>

    <style>

        font-family: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
        font-size: 13px;
        background: #fafafa;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 14px;
        color: #555;
      }
      p.note {
        margin: 0 0 12px;
        color: #777;
      }
      .gantt-wrap {
        background: #fff;
        display: inline-block;
        border: 1px solid #ccc;
      }
      .gantt-row {
        display: grid;
        grid-template-columns: 56px 80px 80px repeat(30, 32px);
        border-bottom: 1px solid #e0e0e0;
      }
      .gantt-row.header {
        background: #fde2c4;
        font-weight: 600;
      }
      .gantt-cell {
        border-right: 1px solid #e0e0e0;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }
      .gantt-cell.label {
        justify-content: flex-start;
        padding: 0 8px;
        background: #fafafa;
      }
      .gantt-cell.row-no {
        justify-content: center;
        color: #2962ff;
        background: #fff;
      }
      .in-range { background: #fff59d; }
      .has-note { background: #fff176; font-weight: 600; }
    </style>
  </head>
